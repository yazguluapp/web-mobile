name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: turkcell-shop-demo
  WIF_PROVIDER: projects/613429496267/locations/global/workloadIdentityPools/github/providers/github-provider
  SA_EMAIL: gh-deployer@turkcell-shop-demo.iam.gserviceaccount.com
  REGION: us-central1
  SERVICE: shop-web
  REPO: shop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Build & push image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${{ env.PROJECT_ID }}/${REPO}/${SERVICE}:${GITHUB_SHA}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${SERVICE} \
            --image "$IMAGE" \
            --region ${REGION} \
            --allow-unauthenticated \
            --port 8080 \
            --add-cloudsql-instances ${{ env.PROJECT_ID }}:${REGION}:shop-sql \
            --set-env-vars INSTANCE_CONNECTION_NAME=${{ env.PROJECT_ID }}:${REGION}:shop-sql,DB_USER=shopuser,DB_NAME=shop \
            --set-secrets DB_PASSWORD=shop-db-password:latest

      - name: Show service URL
        run: gcloud run services describe ${SERVICE} --region ${REGION} --format='value(status.url)'
